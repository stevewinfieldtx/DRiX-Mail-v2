services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: narrative
      POSTGRES_USER: narrative
      POSTGRES_PASSWORD: narrative
    volumes: [narrative_data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U narrative]
      interval: 3s
      timeout: 3s
      retries: 20
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      db: {condition: service_healthy}
  web:
    build:
      context: ./frontend
      args: [NEXT_PUBLIC_API_URL=http://localhost:8000]
    environment: [NEXT_PUBLIC_API_URL=http://localhost:8000]
    ports: ["3000:3000"]
    depends_on: [api]
volumes: {narrative_data: {}}
